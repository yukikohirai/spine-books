  <!-- 3D Carousel Showcase -->

    <div class="showcase-sticky">

      </div>
      <div class="showcase-info" id="showcaseInfo">
        <span class="info-tag"></span>
        <p class="info-title"></p>
        <p class="info-author"></p>
        <p class="info-desc"></p>
      </div>
    </div>
  </section>

  <!-- Books -->

    <div class="section-header">
      <h2 class="section-title">Books</h2>
