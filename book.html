<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPINE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="book-page">

  <!-- Left Spine -->
  <div class="left-spine">
    <div class="spine-line"></div>
    <span class="spine-title">SPINE</span>
    <div class="spine-line"></div>
  </div>

  <main class="book-detail" id="bookDetail">
    <a href="index.html" class="back-link">← Bookshelf</a>

    <div class="detail-grid">
      <div class="detail-cover" id="detailCover"></div>
      <div class="detail-body">
        <p class="detail-to" id="detailTo"></p>
        <h1 class="detail-title" id="detailTitle"></h1>
        <p class="detail-author" id="detailAuthor"></p>
        <p class="detail-desc" id="detailDesc"></p>
        <div class="detail-comment" id="detailComment"></div>
        <div class="buy-links" id="detailLinks"></div>
      </div>
    </div>

    <section class="detail-related" id="detailRelated"></section>
  </main>

  <footer>
    <p class="footer-note">紹介リンクにはアフィリエイトリンクを含みます。</p>
    <p class="footer-brand">SPINE</p>
  </footer>

  <script src="js/book.js"></script>
</body>
</html>
